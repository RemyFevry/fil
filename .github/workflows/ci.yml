name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint + typecheck + build + test
    # Run on Blacksmith (free-tier tuned): ARM 2vCPU is the cheapest tier
    # (0.625x the x64-2vCPU rate). macOS is intentionally NOT in the PR
    # matrix because it consumes free-tier minutes at 20x the rate — see
    # ci-macos-weekly.yml for the dedicated weekly macOS verification job.
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version is read from packageManager in package.json.

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          # `cache: pnpm` transparently uses Blacksmith's colocated
          # cache (~400 MB/s, 25 GB/week free) instead of GitHub's
          # slower Azure-backed cache. No code changes needed.
          cache: pnpm

      # `pnpm fetch` populates the content-addressable store from cache;
      # `pnpm install --offline` then only links into node_modules, so
      # on a cache hit this step is seconds instead of 30s+.
      - name: Fetch deps into pnpm store
        run: pnpm fetch

      - name: Install dependencies (offline)
        run: pnpm install --offline --frozen-lockfile

      # Build first: `tsc -b` emits the .d.ts declarations that the
      # cross-package typecheck resolves, and type-checks the whole graph.
      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Lint markdown
        run: pnpm lint:md

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
