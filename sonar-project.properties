sonar.projectKey=RemyFevry_fil
sonar.organization=remyfevry

sonar.projectName=fil
sonar.sourceEncoding=UTF-8

# Analyze the workspace packages. Tests and build output are separated below.
sonar.sources=packages
sonar.tests=packages
sonar.test.inclusions=packages/**/test/**/*.ts

# Keep generated output, deps and type declarations out of analysis.
sonar.exclusions=**/dist/**,**/node_modules/**,**/*.d.ts

# Test files and configs should not count against coverage.
sonar.coverage.exclusions=packages/**/test/**,**/*.config.ts

# Coverage report produced by `pnpm test:coverage` (vitest v8 provider).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
